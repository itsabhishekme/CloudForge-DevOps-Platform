apiVersion: v1
kind: Secret

metadata:
  name: cloudforge-secret
  namespace: cloudforge

  labels:
    app: cloudforge
    component: secret

type: Opaque

stringData:
  # ==========================================
  # MongoDB
  # ==========================================
  mongo-uri: "mongodb://cloudforge:cloudforge123@cloudforge-mongodb:27017/cloudforge?authSource=cloudforge"

  mongo-username: "cloudforge"
  mongo-password: "cloudforge123"

  # ==========================================
  # Backend
  # ==========================================
  jwt-secret: "change-this-to-a-long-random-secret"

  session-secret: "change-this-session-secret"

  api-key: "cloudforge-api-key"

  # ==========================================
  # Application
  # ==========================================
  app-secret: "cloudforge-production-secret"

  encryption-key: "cloudforge-encryption-key"

  # ==========================================
  # AWS (Example)
  # Replace with your own values or use an
  # external secret management solution.
  # ==========================================
  aws-access-key-id: "YOUR_AWS_ACCESS_KEY_ID"

  aws-secret-access-key: "YOUR_AWS_SECRET_ACCESS_KEY"

  aws-region: "ap-south-1"