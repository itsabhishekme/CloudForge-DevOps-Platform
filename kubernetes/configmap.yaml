apiVersion: v1
kind: ConfigMap

metadata:
  name: cloudforge-config
  namespace: cloudforge

  labels:
    app: cloudforge
    environment: production

data:
  # ==========================================
  # Application
  # ==========================================
  APP_NAME: "CloudForge DevOps Platform"
  APP_VERSION: "1.0.0"
  APP_ENV: "production"

  # ==========================================
  # Frontend
  # ==========================================
  NEXT_PUBLIC_API_URL: "http://cloudforge-backend:5000/api"
  NEXT_TELEMETRY_DISABLED: "1"

  # ==========================================
  # Backend
  # ==========================================
  NODE_ENV: "production"
  PORT: "5000"
  CLIENT_URL: "http://cloudforge.local"

  # ==========================================
  # Database
  # ==========================================
  DATABASE_NAME: "cloudforge"

  # ==========================================
  # Monitoring
  # ==========================================
  PROMETHEUS_ENABLED: "true"
  GRAFANA_ENABLED: "true"

  # ==========================================
  # Logging
  # ==========================================
  LOG_LEVEL: "info"

  # ==========================================
  # Kubernetes
  # ==========================================
  CLUSTER_NAME: "cloudforge-cluster"
  NAMESPACE: "cloudforge"