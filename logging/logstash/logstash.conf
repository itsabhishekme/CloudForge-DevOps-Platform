############################################################
# CloudForge DevOps Platform
# Logstash Pipeline Configuration
############################################################

############################
# INPUT
############################

input {

  beats {
    port => 5044
  }

  tcp {
    port  => 5001
    codec => json
  }

  udp {
    port  => 5001
    codec => json
  }

}

############################
# FILTER
############################

filter {

  #
  # Parse JSON messages
  #
  if [message] =~ "^{.*}$" {
    json {
      source => "message"
    }
  }

  #
  # Add environment if missing
  #
  if ![environment] {
    mutate {
      add_field => {
        "environment" => "development"
      }
    }
  }

  #
  # Add project metadata
  #
  mutate {
    add_field => {
      "project" => "cloudforge-devops-platform"
    }
  }

  #
  # Parse timestamps
  #
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  #
  # Remove unnecessary fields
  #
  mutate {
    remove_field => [
      "host",
      "@version"
    ]
  }

}

############################
# OUTPUT
############################

output {

  #
  # Elasticsearch
  #
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]

    index => "cloudforge-%{+YYYY.MM.dd}"

    ilm_enabled => false
  }

  #
  # Console
  #
  stdout {
    codec => rubydebug
  }

}