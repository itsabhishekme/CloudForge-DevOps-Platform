# ==========================================================
# CloudForge DevOps Platform
# Alertmanager Configuration
# ==========================================================

global:
  resolve_timeout: 5m

route:
  receiver: default-receiver

  group_by:
    - alertname
    - job

  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-receiver

    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

# ==========================================================
