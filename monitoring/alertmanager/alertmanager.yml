# ==========================================================
# Example Slack Configuration
# Uncomment and update values before use.
# ==========================================================
#
# receivers:
#   - name: slack
#
#     slack_configs:
#       - api_url: https://hooks.slack.com/services/XXXX/YYYY/ZZZZ
#         channel: "#devops-alerts"
#         send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"

    target_matchers:
      - severity="warning"

    equal:
      - alertname
      - job