# ==========================================================
# CloudForge DevOps Platform
# Grafana Dashboard Provisioning
# ==========================================================

apiVersion: 1

providers:
  - name: "CloudForge Dashboards"
    orgId: 1

    folder: "CloudForge"

    type: file

    disableDeletion: false
    editable: true

    updateIntervalSeconds: 30

    allowUiUpdates: true

    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false