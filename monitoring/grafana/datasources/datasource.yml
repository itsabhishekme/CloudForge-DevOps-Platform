# ==========================================================
# CloudForge DevOps Platform
# Grafana Datasource Provisioning
# ==========================================================

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.54.0"
      timeInterval: "15s"

    version: 1

  - name: Elasticsearch
    uid: elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: true

    jsonData:
      index: "cloudforge-*"
      timeField: "@timestamp"
      esVersion: 8
      interval: Daily
      logMessageField: message
      logLevelField: level

    version: 1