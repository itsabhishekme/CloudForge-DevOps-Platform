version: "3.9"

services:
  frontend:
    container_name: cloudforge-frontend
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    image: cloudforge/frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - cloudforge-network

  backend:
    container_name: cloudforge-backend
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    image: cloudforge/backend:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/cloudforge
    depends_on:
      - mongodb
    networks:
      - cloudforge-network

  mongodb:
    container_name: cloudforge-mongodb
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cloudforge
    volumes:
      - mongo_data:/data/db
    networks:
      - cloudforge-network

  nginx:
    container_name: cloudforge-nginx
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cloudforge-network

networks:
  cloudforge-network:
    driver: bridge

volumes:
  mongo_data: