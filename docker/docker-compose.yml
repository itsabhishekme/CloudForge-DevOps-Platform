version: "3.9"

services:
  frontend:
    container_name: cloudforge-frontend-dev
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: development
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - cloudforge-network

  backend:
    container_name: cloudforge-backend-dev
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/cloudforge
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - cloudforge-network

  mongodb:
    container_name: cloudforge-mongodb-dev
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cloudforge
    volumes:
      - mongo_data:/data/db
    networks:
      - cloudforge-network

  mongo-express:
    container_name: cloudforge-mongo-express
    image: mongo-express:latest
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - cloudforge-network

networks:
  cloudforge-network:
    driver: bridge

volumes:
  mongo_data: