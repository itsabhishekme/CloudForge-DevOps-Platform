name: CloudForge CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "22"

jobs:
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build Application
        run: npm run build

  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Backend
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: false
          tags: cloudforge/frontend:latest

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: false
          tags: cloudforge/backend:latest

  success:
    name: CI Status
    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend
      - docker

    steps:
      - name: Success
        run: echo "✅ CloudForge CI Pipeline completed successfully."